services:

  # === PostgreSQL Database ===
  postgres:
    image: postgres:16
    container_name: rag-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rag_project
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # === Redis Cache ===
  redis:
    image: redis:7-alpine
    container_name: rag-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # === FastAPI Backend ===
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: rag-chatbot:latest
    container_name: rag-backend
    ports:
      - "8000:8000"
    env_file:
      - Backend/.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/rag_project
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      ENVIRONMENT: production
    volumes:
      - chroma_data:/app/data/vector_db
      - mlflow_data:/app/Backend/mlruns
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # === Streamlit Monitoring Dashboard ===
  streamlit:
    image: rag-chatbot:latest
    container_name: rag-streamlit
    entrypoint: []
    command: ["streamlit", "run", "monitoring/dashboard.py", "--server.port", "8501", "--server.address", "0.0.0.0"]
    ports:
      - "8501:8501"
    env_file:
      - Backend/.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/rag_project
      API_BASE_URL: http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

  # === MLflow Experiment UI ===
  mlflow:
    image: rag-chatbot:latest
    container_name: rag-mlflow
    entrypoint: []
    command: ["mlflow", "ui", "--host", "0.0.0.0", "--port", "5000", "--backend-store-uri", "file:./mlruns"]
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/app/Backend/mlruns
    depends_on:
      - backend
    restart: unless-stopped

  # === Prometheus Metrics ===
  prometheus:
    image: prom/prometheus:latest
    container_name: rag-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  chroma_data:
  mlflow_data:
